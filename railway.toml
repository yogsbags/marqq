[build]
builder = "nixpacks"

[deploy]
# Single server on $PORT: serves frontend + proxies backend
startCommand = "npm start"
healthcheckPath = "/"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

# Notes:
# - The backend listens on http://localhost:3006 inside the container.
# - The Node server listens on $PORT and proxies /api/* to the backend.
